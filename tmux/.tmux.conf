# ==========================
# 1. CORE SETTINGS
# ==========================

# --- LEADER KEY: Ctrl + t ---
unbind C-b
set -g prefix C-t
bind C-t send-prefix

# --- DISPLAY & COLOR ---
# True color cho Ghostty + xterm
set -g default-terminal "tmux-256color"
set -ag terminal-overrides ",xterm-256color:RGB,xterm-ghostty:RGB"
set -ag terminal-features ",xterm-ghostty:hyperlinks"

# OSC 52 clipboard passthrough (neovim copy hoạt động qua SSH)
set -g allow-passthrough on
set -as terminal-features ",*:clipboard"

# Focus events — neovim cần để auto-reload file khi switch pane
set -g focus-events on

# Index bắt đầu từ 1
set -g base-index 1
set -g pane-base-index 1
set-window-option -g pane-base-index 1
set-option -g renumber-windows on

# Tên window cố định
set-option -g allow-rename off
set -wg automatic-rename off

# Tăng giới hạn log
set -g history-limit 50000

# Tắt delay Esc (quan trọng cho neovim)
set -s escape-time 0

# Bật chuột
set -g mouse on

# Reload config: Prefix + r
bind r source-file ~/.tmux.conf \; display "Reloaded!"

# ==========================
# 2. KEY BINDINGS & NAVIGATION
# ==========================

# Split window tại thư mục hiện tại
bind | split-window -h -c "#{pane_current_path}"
bind - split-window -v -c "#{pane_current_path}"
bind \\ split-window -h -c "#{pane_current_path}"
bind \/ split-window -v -c "#{pane_current_path}"

# Tạo window mới tại thư mục hiện tại
bind c new-window -c "#{pane_current_path}"

# Di chuyển giữa pane
bind h select-pane -L
bind j select-pane -D
bind k select-pane -U
bind l select-pane -R

# Resize pane
bind -r H resize-pane -L 5
bind -r J resize-pane -D 5
bind -r K resize-pane -U 5
bind -r L resize-pane -R 5

# Zoom pane
bind -r m resize-pane -Z

# ==========================
# 3. COPY MODE & LOG MINER
# ==========================

set-window-option -g mode-keys vi

bind-key -T copy-mode-vi v send-keys -X begin-selection

# Cross-platform copy: macOS dùng pbcopy, Linux dùng xclip
if-shell "uname | grep -q Darwin" \
  "bind-key -T copy-mode-vi y send-keys -X copy-pipe-and-cancel 'pbcopy'" \
  "bind-key -T copy-mode-vi y send-keys -X copy-pipe-and-cancel 'xclip -in -selection clipboard'"

# LOG MINER: Prefix + f
if-shell "uname | grep -q Darwin" \
  "bind-key f display-popup -E -w 95% -h 90% \
    \"tmux capture-pane -S -32768 -p | fzf --reverse --multi --cycle \
    --header='LOG SEARCH (Tab: Multi-select | Enter: Copy)' \
    --bind 'enter:execute(echo {+} | pbcopy)+accept'\"" \
  "bind-key f display-popup -E -w 95% -h 90% \
    \"tmux capture-pane -S -32768 -p | fzf --reverse --multi --cycle \
    --header='LOG SEARCH (Tab: Multi-select | Enter: Copy)' \
    --bind 'enter:execute(echo {+} | xclip -selection clipboard)+accept'\""

# ==========================
# 4. PLUGINS (TPM)
# ==========================

set -g @plugin 'tmux-plugins/tpm'
set -g @plugin 'tmux-plugins/tmux-sensible'
set -g @plugin 'tmux-plugins/tmux-resurrect'
set -g @plugin 'tmux-plugins/tmux-continuum'
set -g @plugin 'tmux-plugins/tmux-battery'
set -g @plugin 'tmux-plugins/tmux-online-status'
set -g @plugin 'tmux-plugins/tmux-cpu'

# Uncomment nếu muốn navigate giữa nvim split và tmux pane bằng Ctrl+h/j/k/l
# set -g @plugin 'christoomey/vim-tmux-navigator'

# ==========================
# 5. THEME — CATPPUCCIN MOCHA
# ==========================

set -g @plugin 'catppuccin/tmux'
set -g @catppuccin_flavor "mocha"
set -g @catppuccin_status_background "none"
set -g @catppuccin_window_status_style "none"
set -g @catppuccin_pane_status_enabled "off"
set -g @catppuccin_pane_border_status "off"

# Status left
set -g status-left-length 100
set -g status-left ""
set -ga status-left "#{?client_prefix,#{#[bg=#{@thm_red},fg=#{@thm_bg},bold]  #S },#{#[bg=#{@thm_bg},fg=#{@thm_green}]  #S }}"
set -ga status-left "#[bg=#{@thm_bg},fg=#{@thm_overlay_0},none]│"
set -ga status-left "#[bg=#{@thm_bg},fg=#{@thm_maroon}]  #{pane_current_command} "
set -ga status-left "#[bg=#{@thm_bg},fg=#{@thm_overlay_0},none]│"
set -ga status-left "#[bg=#{@thm_bg},fg=#{@thm_blue}]  #{=/-32/...:#{s|$USER|~|:#{b:pane_current_path}}} "
set -ga status-left "#[bg=#{@thm_bg},fg=#{@thm_overlay_0},none]#{?window_zoomed_flag,│,}"
set -ga status-left "#[bg=#{@thm_bg},fg=#{@thm_yellow}]#{?window_zoomed_flag,  zoom ,}"

# Status right
set -g status-right-length 100
set -g status-right ""
set -ga status-right "#{?#{e|>=:10,#{battery_percentage}},#{#[bg=#{@thm_red},fg=#{@thm_bg}]},#{#[bg=#{@thm_bg},fg=#{@thm_pink}]}} #{battery_icon} #{battery_percentage} "
set -ga status-right "#[bg=#{@thm_bg},fg=#{@thm_overlay_0},none]│"
set -ga status-right "#[bg=#{@thm_bg},fg=#{@thm_yellow}]  #{cpu_percentage} "
set -ga status-right "#[bg=#{@thm_bg},fg=#{@thm_overlay_0},none]│"
set -ga status-right "#[bg=#{@thm_bg},fg=#{@thm_teal}]  #{ram_percentage} "
set -ga status-right "#[bg=#{@thm_bg},fg=#{@thm_overlay_0},none]│"
set -ga status-right "#[bg=#{@thm_bg},fg=#{@thm_blue}] 󰭦 %Y-%m-%d 󰅐 %H:%M "

# Status bar
set -g status-position top
set -g status-style "bg=#{@thm_bg}"
set -g status-justify "absolute-centre"

# Pane border
setw -g pane-border-status top
setw -g pane-border-format ""
setw -g pane-active-border-style "bg=#{@thm_bg},fg=#{@thm_overlay_0}"
setw -g pane-border-style "bg=#{@thm_bg},fg=#{@thm_surface_0}"
setw -g pane-border-lines single

# Window style
set -g window-status-format " #I#{?#{!=:#{window_name},Window},: #W,} "
set -g window-status-style "bg=#{@thm_bg},fg=#{@thm_rosewater}"
set -g window-status-last-style "bg=#{@thm_bg},fg=#{@thm_peach}"
set -g window-status-activity-style "bg=#{@thm_red},fg=#{@thm_bg}"
set -g window-status-bell-style "bg=#{@thm_red},fg=#{@thm_bg},bold"
set -gF window-status-separator "#[bg=#{@thm_bg},fg=#{@thm_overlay_0}]│"
set -g window-status-current-format " #I#{?#{!=:#{window_name},Window},: #W,} "
set -g window-status-current-style "bg=#{@thm_peach},fg=#{@thm_bg},bold"

# Online status icons
set -g @online_icon "ok"
set -g @offline_icon "nok"

# Auto restore session
set -g @continuum-restore 'on'

# Luôn để dòng này cuối cùng
run '~/.tmux/plugins/tpm/tpm'
